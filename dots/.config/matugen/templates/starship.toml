palette = 'colors'

[palettes.colors]
color1 = '{{base16.base08.default.hex}}'
color2 = '{{colors.secondary_fixed_dim.default.hex}}'
color3 = '{{colors.tertiary_fixed_dim.default.hex}}'
color4 = '{{colors.on_primary_fixed_variant.default.hex}}'
color5 = '{{colors.on_secondary_fixed_variant.default.hex}}'
color6 = '{{colors.on_tertiary_fixed_variant.default.hex}}'
color7 = '{{colors.on_surface_variant.default.hex}}'
color8 = '{{colors.surface_container_highest.default.hex}}'
color9 = '{{colors.primary.default.hex}}'

[username]
show_always = true
style_user = "bg:color1"
style_root = "bg:color1"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:color1"
disabled = true

[directory]
style = "bg:color4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇŽ/"


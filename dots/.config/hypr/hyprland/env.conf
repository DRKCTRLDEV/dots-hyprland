######### Applications #########
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

# ############ Themes #############
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, kde
env = XDG_MENU_PREFIX, plasma-

# ######## Virtual envrionment #########
env = ILLOGICAL_IMPULSE_VIRTUAL_ENV, ~/.local/state/quickshell/.venv

# ##### Wayland #####
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland

# ##### Nvidia #####
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct
env = VDPAU_DRIVER,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ##### XDG cleanup #####
env = CUDA_CACHE_PATH,$HOME/.cache/nv
env = DOTNET_CLI_HOME,$HOME/.local/share/dotnet
env = NPM_CONFIG_CACHE,$HOME/.cache/npm
env = NPM_CONFIG_INIT_MODULE,$HOME/.config/npm/config/npm-init.js
env = NPM_CONFIG_TMP,$HOME/.cache/npm-tmp
env = _JAVA_OPTIONS,-Djava.util.prefs.userRoot=$HOME/.config/java

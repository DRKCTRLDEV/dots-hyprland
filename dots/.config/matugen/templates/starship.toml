palette = 'colors'

[palettes.colors]
color1 = "{{colors.on_primary_container.default.hex}}"
color2 = "{{colors.primary.default.hex}}"
color3 = "{{colors.secondary.default.hex}}"
color4 = "{{colors.primary.default.hex}}"
color5 = "{{colors.inverse_primary.default.hex}}"
color6 = "{{colors.primary_container.default.hex}}"
color7 = "{{colors.secondary_container.default.hex}}"
color8 = "{{colors.on_primary.default.hex}}"

color9  = "{{colors.primary_container.default.hex}}"
color10 = "{{colors.on_primary.default.hex}}"
color11 = "{{colors.on_secondary.default.hex}}"
color12 = "{{colors.on_primary.default.hex}}"
color13 = "{{colors.primary.default.hex}}"
color14 = "{{colors.on_primary_container.default.hex}}"
color15 = "{{colors.on_secondary_container.default.hex}}"
color16 = "{{colors.primary.default.hex}}"

[username]
show_always = true
style_user = "bg:color1 fg:color9"
style_root = "bg:color1 fg:color9"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:color1 fg:color9"
disabled = true

[directory]
style = "bg:color4 fg:color12"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "´Éÿ"
style = "bg:color5 fg:color13"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color5 fg:color13"
format = '[$all_status$ahead_behind ]($style)'

